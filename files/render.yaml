# ──────────────────────────────────────────────────────────────
# Render Deployment Configuration
# Docs: https://render.com/docs/yaml-spec
# ──────────────────────────────────────────────────────────────

services:
  - type: web
    name: handwritten-text-recognition
    env: python
    region: oregon          # Change to: frankfurt, singapore, ohio as needed
    plan: free              # Use 'starter' for always-on

    # ── Build ──────────────────────────────────────────────────
    # Installs Tesseract OCR (system dependency) THEN Python packages
    buildCommand: |
      apt-get update && apt-get install -y tesseract-ocr tesseract-ocr-eng libgl1-mesa-glx
      pip install --upgrade pip
      pip install -r requirements.txt

    # ── Start ──────────────────────────────────────────────────
    # Gunicorn: 2 workers, binds to $PORT provided by Render
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120

    # ── Environment Variables ───────────────────────────────────
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: TESSDATA_PREFIX
        value: /usr/share/tesseract-ocr/4.00/tessdata

    # ── Health Check ────────────────────────────────────────────
    healthCheckPath: /

    # ── Auto-Deploy from GitHub ─────────────────────────────────
    autoDeploy: true
